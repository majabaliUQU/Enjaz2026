<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مشاريع معرض إنجاز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="container py-4">
<div class="hero">
<h1 class="mb-4">مشاريع معرض إنجاز</h1>

<input id="search" class="form-control mb-3" placeholder="ابحث في المشاريع">

<div class="row g-2">
<div class="col-md-3"><select id="reviewer" class="form-select"></select></div>
<div class="col-md-3"><select id="section" class="form-select"></select></div>
<div class="col-md-3"><select id="track" class="form-select"></select></div>
<div class="col-md-3"><select id="supervisor" class="form-select"></select></div>
</div>
</div>

<div class="row g-3 my-4">
<div class="col-md-3"><div class="stat"><div>عدد المشاريع</div><h3 id="projectsCount"></h3></div></div>
<div class="col-md-3"><div class="stat"><div>عدد التخصصات</div><h3 id="tracksCount"></h3></div></div>
<div class="col-md-3"><div class="stat"><div>عدد المشرفين</div><h3 id="supervisorsCount"></h3></div></div>
<div class="col-md-3"><div class="stat"><div>عدد المحكمين</div><h3 id="reviewersCount"></h3></div></div>
</div>

<div id="cards" class="row g-4"></div>
</div>
<script src="assets/app.js"></script>
</body></html>
