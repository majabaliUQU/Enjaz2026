function unique(f){return [...new Set(data.map(x=>x[f]).filter(Boolean))].sort()}
function fill(id,f){let s=document.getElementById(id); unique(f).forEach(v=>s.add(new Option(v,v)));}
fill('track','track'); fill('section','gender_section'); fill('supervisor','supervisor'); fill('reviewer','reviewer');

function getFiltered(){
const q=document.getElementById('search').value.toLowerCase();
return data.filter(r=>
(!document.getElementById('track').value||r.track===track.value) &&
(!document.getElementById('section').value||r.gender_section===section.value) &&
(!document.getElementById('supervisor').value||r.supervisor===supervisor.value) &&
(!document.getElementById('reviewer').value||r.reviewer===reviewer.value) &&
JSON.stringify(r).toLowerCase().includes(q));
}

function render(){
const f=getFiltered();
c1.textContent=f.length;
c2.textContent=new Set(f.map(x=>x.track)).size;
c3.textContent=new Set(f.map(x=>x.supervisor)).size;
c4.textContent=new Set(f.map(x=>x.reviewer)).size;

cards.innerHTML=f.map(r=>`
<div class="col-md-4">
<div class="card card-project">
<div class="card-body">
<h5>${r.project_title}</h5>
<p>${r.project_id}</p>
<p>${r.supervisor}</p>
<a class="btn btn-primary" href="projects/${r.project_id.toString().replaceAll(' ','-').toLowerCase()}.html">التفاصيل</a>
</div></div></div>`).join('');

tbody.innerHTML=f.map(r=>`<tr><td>${r.project_id}</td><td>${r.project_title}</td><td>${r.supervisor}</td><td>${r.reviewer}</td></tr>`).join('');
window.filtered=f;
}

function cardsView(){cards.style.display='flex';tableWrap.style.display='none';}
function tableView(){cards.style.display='none';tableWrap.style.display='block';}
function randomProject(){if(filtered.length) location.href='projects/'+filtered[Math.floor(Math.random()*filtered.length)].project_id.toString().replaceAll(' ','-').toLowerCase()+'.html';}

document.querySelectorAll('input,select').forEach(x=>x.addEventListener('input',render));
render();
</script>
